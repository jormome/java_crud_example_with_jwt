<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{plantillas/plantilla :: head}"></head>

<body>

    <header th:replace="~{plantillas/plantilla :: header}"></header>

    <section th:replace="~{plantillas/mensajesLogin :: mensajesLogin }"></section>

    <section id="actions" class="py-4 mb-4 bg-light">
        <div class="container">
            <div class="row">
                <!-- agregar botones -->
            </div>
        </div>
    </section>

    <section id="login">
        <div class="container">
            <div class="row">
                <div class="col-md-6 mx-auto">
                    <div class="card">
                        <div class="card-header">
                            <h4>[[#{login.titulo}]]</h4>
                        </div>

                        <div class="card-body py-2">
                            <form th:action="@{/login}" method="post">

                                <div class="row align-items-center mb-2">
                                    <label for="username"
                                        class="col-3 col-form-label text-start">[[#{login.username}]]</label>
                                    <div class="col-9">
                                        <input type="text" id="username" name="username" class="form-control" />
                                    </div>
                                </div>

                                <div class="row align-items-center mb-3">
                                    <label for="password"
                                        class="col-3 col-form-label text-start">[[#{login.password}]]</label>
                                    <div class="col-9">
                                        <input type="password" id="password" name="password" class="form-control" />
                                    </div>
                                </div>

                                <!-- <div class="form-group">
                                    <label class="form-control">[[#{login.username}]]</label>
                                    <input type="text" name="username" class="form-control" />
                                </div>

                                <div class="form-group py-2">
                                    <label class="form-control">[[#{login.password}]]</label>
                                    <input type="password" name="password" class="form-control" />
                                </div> -->

                                <input type="submit" th:value="#{login.boton}" class="btn btn-primary w-100" />
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer th:replace="~{plantillas/plantilla :: footer}"></footer>
</body>

</html>
