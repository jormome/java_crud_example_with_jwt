<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <title th:text="#{editar_cliente.titulo}">Editar Cliente</title>
</head>

<body>
    <section th:fragment="editarCliente">
        <form th:action="@{/personas/save}" method="post" th:object="${objects}" class="was-validated">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" th:field="*{idPersona}" />

            <section th:replace="plantillas/botonesEditar :: botonesEditar"></section>

            <div class="details">
                <div class="container">
                    <div class="row">
                        <div class="col">
                            <div class="card">
                                <div class="card-header">
                                    <h4>[[#{accion.editar}]]</h4>
                                </div>

                                <div class="card-body">
                                    <div class="form-group py-2">
                                        <label for="nombre">[[#{persona.tabla.nombre}]]</label>
                                        <input type="text" class="form-control" th:field="*{nombre}" required
                                            name="nombre" />
                                    </div>

                                    <div class="form-group py-2">
                                        <label for="apellido">[[#{persona.tabla.apellido}]]</label>
                                        <input type="text" class="form-control" th:field="*{apellido}" required
                                            name="apellido" />
                                    </div>

                                    <div class="form-group py-2">
                                        <label for="email">[[#{persona.tabla.email}]]</label>
                                        <input type="email" class="form-control" th:field="*{email}" required
                                            name="email" />
                                    </div>

                                    <div class="form-group py-2">
                                        <label for="telefono">[[#{persona.tabla.telefono}]]</label>
                                        <input type="tel" class="form-control" th:field="*{telefono}" required
                                            name="telefono" />
                                    </div>

                                    <div class="form-group py-2">
                                        <label for="saldo">[[#{persona.tabla.saldo}]]</label>
                                        <input type="number" class="form-control" th:field="*{saldo}" required
                                            name="saldo" step="0.01" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </form>
    </section>
</body>

</html>
