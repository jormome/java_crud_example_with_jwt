<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
    xmls:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <title th:text="#{agregar_cliente.titulo}">Agregar Cliente</title>
</head>

<body>
    <section th:fragment="agregarCliente">
        <div id="agregarCliente" class="modal fade">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header bg-info text-white">
                        <h5 class="modal-title" th:text="#{accion.agregar}">Agregar Cliente</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <!-- class="was-validated" = validacion por bootstrap -->
                    <form th:action="@{/personas/guardar}" method="post" th:object="${personaForm}" class="was-validated">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="modal-body">
                            <div class="form-group">
                                <label for="nombre" th:text="#{persona.tabla.nombre}">Nombre</label>
                                <input type="text" class="form-control" name="nombre" required />
                                <!-- <div class="invalid-feedback" th:if="${#fields.hasErrors('  nombre')}">
                                    <span th:errors="*{nombre}"></span>
                                </div> -->
                            </div>

                            <div class="form-group">
                                <label for="apellido" th:text="#{persona.tabla.apellido}">Apellido</label>
                                <input type="text" class="form-control" name="apellido" required />
                                <!-- <div class="invalid-feedback" th:if="${#fields.hasErrors('  apellido')}">
                                    <span th:errors="*{apellido}"></span>
                                </div> -->
                            </div>

                            <div class="form-group">
                                <label for="email" th:text="#{persona.tabla.email}">Email</label>
                                <input type="email" class="form-control" name="email" required />
                                <!-- <div class="invalid-feedback" th:if="${#fields.hasErrors('  email')}">
                                    <span th:errors="*{email}"></span>
                                </div> -->
                            </div>

                            <div class="form-group">
                                <label for="telefono" th:text="#{persona.tabla.telefono}">Teléfono</label>
                                <input type="tel" class="form-control" name="telefono" />
                                <!-- <div class="invalid-feedback" th:if="${#fields.hasErrors('  telefono')}">
                                    <span th:errors="*{telefono}"></span>
                                </div> -->
                            </div>

                            <div class="form-group">
                                <label for="saldo" th:text="#{persona.tabla.saldo}">Saldo</label>
                                <input type="number" class="form-control" name="saldo" required step="0.01" />
                                <!-- <div class="invalid-feedback" th:if="${#fields.hasErrors('  saldo')}">
                                    <span th:errors="*{saldo}"></span>
                                </div> -->
                            </div>

                            <div class="modal-footer">
                                <button type="submit" class="btn btn-primary"
                                    th:text="#{accion.guardar}">Guardar</button>
                            </div>
                    </form>
                </div>
            </div>
    </section>
</body>

</html>
