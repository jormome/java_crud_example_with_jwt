<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8" />
    <title>Botones Editar</title>
</head>

<body>
    <section th:fragment="botonesEditar">
        <div id="actions" class="py-4 mb-4 bg-light">
            <div class="container">
                <div class="row">
                    <div class="col-md-3">
                        <a th:href="@{/personas}" class="btn btn-light w-100">
                            <i class="fas fa-arrow-left"></i> [[#{accion.regresar}]]
                        </a>
                    </div>

                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success w-100">
                            <i class="fas fa-save"></i> [[#{accion.guardar}]]
                        </button>
                    </div>

                    <div class="col-md-3">
                        <a th:href="@{/personas/delete/{id}(id=*{idPersona})}" class="btn btn-danger w-100">
                            <i class="fas fa-trash"></i> [[#{accion.eliminar}]]
                        </a>
                    </div>
                </div>
            </div>
    </section>
</body>

</html>
