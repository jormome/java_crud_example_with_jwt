spring.application.name=ControlClientes

spring.main.banner-mode=off

spring.datasource.url=jdbc:mysql://localhost:3306/testdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=TRUE
spring.datasource.username=${DB_USER:root}
# Use una variable de entorno para la contraseña si no quiere incluirla en el repositorio
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# No fijamos dialecto: Hibernate 7 lo detecta automaticamente por JDBC metadata.

# 1. Mostrar el SQL en consola
# spring.jpa.show-sql=true

# 2. Formatear el SQL para que sea legible (CON LA 'T')
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG

# 3. Mostrar los valores de los parámetros (?)
# logging.level.org.hibernate.orm.jdbc.bind=trace
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE